apiVersion: apps/v1
kind: Deployment
metadata:
  name: ph-holdings-api
  namespace: ph-holdings
  labels:
    app: ph-holdings-api
    tier: backend
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ph-holdings-api
  template:
    metadata:
      labels:
        app: ph-holdings-api
        tier: backend
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: api-server
        image: ph-holdings-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: metrics
          containerPort: 8080
          protocol: TCP

        env:
        - name: DATABASE_PATH
          value: "/data/ph_holdings.db"
        - name: ALLOWED_ORIGINS
          value: "http://localhost:5173,http://localhost:8080"
        - name: RATE_LIMIT_PER_MIN
          value: "60"
        - name: LOG_LEVEL
          value: "info"

        # Volume mounts
        volumeMounts:
        - name: data
          mountPath: /data

        # Resource limits (adjust based on load testing)
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"

        # Startup probe - give app time to initialize
        # Max wait: 90s (30 failures × 3s period)
        startupProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 3
          timeoutSeconds: 2
          successThreshold: 1
          failureThreshold: 30

        # Readiness probe - is app ready to accept traffic?
        # Checks: database connectivity + services initialized
        readinessProbe:
          httpGet:
            path: /ready
            port: http
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3

        # Liveness probe - is app still responsive?
        # Fast check (no DB calls) to detect deadlocks
        livenessProbe:
          httpGet:
            path: /live
            port: http
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 2
          successThreshold: 1
          failureThreshold: 3

        # Security context
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL

      # Volumes
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: ph-holdings-data

      # Pod security
      securityContext:
        fsGroup: 1000

      # Restart policy
      restartPolicy: Always

      # DNS policy
      dnsPolicy: ClusterFirst

---
apiVersion: v1
kind: Service
metadata:
  name: ph-holdings-api
  namespace: ph-holdings
  labels:
    app: ph-holdings-api
spec:
  type: ClusterIP
  selector:
    app: ph-holdings-api
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: metrics
    protocol: TCP
  sessionAffinity: None

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ph-holdings-data
  namespace: ph-holdings
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard

---
# Optional: HorizontalPodAutoscaler for auto-scaling
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ph-holdings-api-hpa
  namespace: ph-holdings
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ph-holdings-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max

---
# Optional: ServiceMonitor for Prometheus Operator
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ph-holdings-api
  namespace: ph-holdings
  labels:
    app: ph-holdings-api
spec:
  selector:
    matchLabels:
      app: ph-holdings-api
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
